# Nepher Subnet Docker Compose Configuration
#
# Architecture:
#   - validator:     Lightweight orchestrator (CPU) — downloads agents, spawns
#                    sandbox containers, submits results, sets weights on-chain.
#   - sandbox:       GPU container (Isaac Sim) — runs untrusted miner agent code
#                    in complete isolation. NOT a long-running service; spawned
#                    on-demand by the validator via Docker socket.
#   - validator-cpu: Weights & burn only (no evaluation).
#   - miner:         Agent submission.
#
# Usage:
#   # Build all images:
#   docker-compose build
#
#   # Run validator (orchestrator + sandbox):
#   docker-compose up validator
#
#   # Run CPU-only validator (weights/burn):
#   docker-compose up validator-cpu
#
#   # Submit agent:
#   docker-compose run miner submit --path /app/agent

services:
  # =========================================================================
  # Miner Service (Lightweight - Submission Only)
  # =========================================================================
  miner:
    build:
      context: .
      dockerfile: docker/Dockerfile.miner
    volumes:
      # Wallet access (read-only)
      - ${BITTENSOR_WALLET_PATH:-~/.bittensor}:/root/.bittensor:ro
      # Agent directory (read-only)
      - ${AGENT_PATH:-.}/agent:/app/agent:ro
    environment:
      - NEPHER_API_KEY=${NEPHER_API_KEY}
      - NEPHER_API_URL=${NEPHER_API_URL:-https://tournament-api.nepher.ai}
    networks:
      - nepher-net
    profiles:
      - miner

  # =========================================================================
  # Sandbox Image (GPU - Isaac Sim - Agent Evaluation)
  # NOT a running service. Built here so `docker-compose build` creates it.
  # The validator spawns sandbox containers on-demand via Docker socket.
  # =========================================================================
  sandbox:
    build:
      context: .
      dockerfile: docker/Dockerfile.sandbox
      args:
        - EVAL_REPO_URL=${EVAL_REPO_URL:-https://github.com/nepher-ai/eval-nav.git}
    image: nepher-sandbox:latest
    # This service is never started directly — it only exists to build the image.
    profiles:
      - build-only

  # =========================================================================
  # Validator Service (Lightweight Orchestrator - Docker-in-Docker)
  # Downloads agents, spawns sandbox containers for evaluation, sets weights.
  # =========================================================================
  validator:
    build:
      context: .
      dockerfile: docker/Dockerfile.validator
    depends_on:
      sandbox:
        condition: service_started
        required: false
    volumes:
      # Docker socket — required to spawn sandbox containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Wallet access (read-only)
      - ${BITTENSOR_WALLET_PATH:-~/.bittensor}/wallets:/root/.bittensor/wallets:ro
      # Configuration (read-only)
      - ./config:/app/config:ro
      # Workspace (read-write for agent downloads, eval configs, results)
      - ./workspace:/app/workspace
      # Local agent ZIP for local evaluation (mount the project root for access)
      - .:/app/project:ro
      # Live-mount source code (no rebuild needed on code changes)
      - ./nepher_core:/app/nepher_core:ro
      - ./validator:/app/validator:ro
      # Environment cache — validator downloads benchmarks here, sandbox reads them.
      # Must be a bind mount (not a named volume) so the host path is known for DinD.
      - ./data/env-cache:/root/.cache/nepher
      # Logs (optional, for debugging)
      - ./logs:/app/logs
    environment:
      - NEPHER_API_KEY=${NEPHER_API_KEY}
      - NEPHER_API_URL=${NEPHER_API_URL:-https://tournament-api.nepher.ai}
      - ENVHUB_API_URL=${ENVHUB_API_URL:-https://envhub-api.nepher.ai}
      - EVAL_REPO_URL=${EVAL_REPO_URL:-https://github.com/nepher-ai/eval-nav.git}
      - NEPHER_CACHE_DIR=/root/.cache/nepher
      # Sandbox image name (must match the image built above)
      - SANDBOX_IMAGE=nepher-sandbox:latest
      # Host-side path mapping for Docker-in-Docker volume mounts.
      # The validator runs inside a container but spawns sandbox containers
      # via the host Docker daemon, so -v paths must be HOST paths.
      - HOST_WORKSPACE=${PWD}/workspace
      - HOST_ENV_CACHE=${PWD}/data/env-cache
    networks:
      - nepher-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import nepher_core; print('OK')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # =========================================================================
  # CPU Validator Service (No GPU — weights & burn only)
  # Lightweight image (~200 MB) — no Isaac Sim, no NVIDIA drivers.
  # =========================================================================
  validator-cpu:
    build:
      context: .
      dockerfile: docker/Dockerfile.validator-cpu
    volumes:
      # Wallet access (read-only)
      - ${BITTENSOR_WALLET_PATH:-~/.bittensor}/wallets:/root/.bittensor/wallets:ro
      # Configuration (read-only)
      - ./config:/app/config:ro
      # Logs (optional, for debugging)
      - ./logs:/app/logs
    environment:
      - NEPHER_API_KEY=${NEPHER_API_KEY}
      - NEPHER_API_URL=${NEPHER_API_URL:-https://tournament-api.nepher.ai}
    networks:
      - nepher-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

# =========================================================================
# Networks
# =========================================================================
networks:
  nepher-net:
    driver: bridge

