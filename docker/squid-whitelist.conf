# Nepher Sandbox — Transparent HTTPS Proxy Configuration
#
# Squid intercepts ALL outbound HTTPS connections (via iptables NAT redirect),
# peeks at the TLS SNI (Server Name Indication), and only allows connections
# to whitelisted domains. No MITM / no decryption — just SNI inspection.
#
# This prevents untrusted miner agent code from:
#   - Exfiltrating data to arbitrary servers
#   - Downloading secondary payloads
#   - Establishing reverse shells
#   - Crypto mining via C2 servers
#
# While still allowing Isaac Sim to stream USD assets from NVIDIA's CDN.

# ── Ports ──────────────────────────────────────────────────────
# Transparent intercept ports (traffic redirected here by iptables NAT)
http_port  3128 intercept
https_port 3129 intercept ssl-bump \
    cert=/etc/squid/ssl/squid-ca.pem \
    generate-host-certificates=off \
    options=NO_SSLv3,NO_TLSv1

# ── Domain whitelist ──────────────────────────────────────────
# Only these domains are reachable from the sandbox.
acl whitelist ssl::server_name .omniverse-content-production.s3-us-west-2.amazonaws.com
acl whitelist_http dstdomain .omniverse-content-production.s3-us-west-2.amazonaws.com

# ── SSL bump: peek at SNI, splice if whitelisted, terminate otherwise ──
acl step1 at_step SslBump1
ssl_bump peek step1
ssl_bump splice whitelist
ssl_bump terminate all

# ── HTTP access control ───────────────────────────────────────
http_access allow whitelist_http
http_access deny all

# ── Performance ───────────────────────────────────────────────
cache deny all
dns_v4_first on

# ── Process ───────────────────────────────────────────────────
cache_effective_user proxy
cache_effective_group proxy

# ── Logging (minimal) ────────────────────────────────────────
access_log stdio:/var/log/squid/access.log
cache_log /var/log/squid/cache.log
pid_filename /var/run/squid/squid.pid

# Suppress warnings about missing swap dirs
cache_dir null /tmp
